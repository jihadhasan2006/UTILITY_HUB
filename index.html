<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIH4D // PREMIUM UTIL V3.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.2.2/otpauth.umd.min.js"></script>
    <style>
        /* =========================================
           CLEAN & COMPACT VARIABLE ENGINE
           ========================================= */
        :root {
            --bg-base: #f3f4f6;
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --input-bg: #f9fafb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --danger: #ef4444;
            --success: #10b981;
        }

        .dark-theme {
            --bg-base: #111827;
            --card-bg: #1f2937;
            --card-border: #374151;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --input-bg: #111827;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* Height made dynamic so scrolling isn't needed */
        .app-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            width: 90%;
            max-width: 400px;
            height: auto; 
            min-height: 500px;
            max-height: 96vh;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header { 
            padding: 14px 20px 0px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            min-height: 48px;
        }
        
        .header h2 {
            font-size: 15px; 
            font-weight: 600; 
            color: var(--text-main); 
            margin: 0;
        }

        .theme-btn { 
            background: transparent; 
            border: 1px solid var(--card-border); 
            width: 32px; height: 32px; 
            border-radius: 8px; 
            cursor: pointer; 
            color: var(--text-main);
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .theme-btn:hover { background: var(--input-bg); }

        .content { padding: 12px 20px 16px; flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        h3 { font-size: 15px; margin-bottom: 4px; color: var(--text-main); font-weight: 600; }
        p.desc { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.4; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .btn { 
            background: var(--card-bg); 
            color: var(--text-main); 
            border: 1px solid var(--card-border); 
            padding: 10px; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: 0.2s; 
            width: 100%;
        }
        .btn:hover { background: var(--input-bg); border-color: var(--text-muted); }

        .btn-primary { background: var(--primary); color: #fff; border: none; }
        .btn-primary:hover { background: var(--primary-hover); }

        .input-group { margin-bottom: 12px; }
        .input-box { 
            width: 100%; 
            padding: 10px 12px; 
            border: 1px solid var(--card-border); 
            background: var(--input-bg); 
            color: var(--text-main); 
            border-radius: 8px; 
            font-size: 13px; 
            outline: none; 
            transition: 0.2s; 
        }
        .input-box:focus { border-color: var(--primary); }

        .dev-link { 
            display: block; 
            text-align: right; 
            font-size: 10px; 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 500; 
            margin-top: 4px; 
        }
        .dev-link:hover { text-decoration: underline; }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--card-border); transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #fff; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        .data-card { 
            background: var(--input-bg); 
            border: 1px solid var(--card-border); 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
        }

        .code-display { 
            font-size: 24px; /* Reduced font size */
            font-weight: 600; 
            color: var(--primary); 
            text-align: center; 
            letter-spacing: 3px; /* Reduced letter spacing */
            margin: 4px 0; /* Reduced margin */
        }

        .clickable-data { 
            color: var(--primary); 
            font-weight: 500; 
            cursor: pointer; 
            padding: 8px; 
            background: var(--card-bg); 
            border: 1px solid var(--card-border);
            border-radius: 6px; 
            transition: 0.2s; 
            display: inline-block; 
            margin: 2px; 
            font-size: 13px;
        }
        .clickable-data:hover { border-color: var(--primary); }

        .divider { height: 1px; background: var(--card-border); margin: 12px 0; }

        .footer { 
            text-align: center; 
            padding: 12px; 
            font-size: 11px; 
            color: var(--text-muted); 
            border-top: 1px solid var(--card-border); 
        }
        .footer span { color: var(--primary); }

        #toast { 
            visibility: hidden; 
            min-width: 180px; 
            background: var(--text-main); 
            color: var(--bg-base); 
            text-align: center; 
            border-radius: 8px; 
            padding: 10px; 
            position: fixed; 
            z-index: 100; 
            bottom: 30px; 
            left: 50%; 
            transform: translate(-50%, 20px); 
            font-size: 12px; 
            font-weight: 500; 
            opacity: 0; 
            transition: 0.3s ease; 
        }
        #toast.show { visibility: visible; opacity: 1; transform: translate(-50%, 0); }

        .fade-in { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .spinner { 
            display: inline-block; 
            width: 20px; height: 20px; 
            border: 2px solid var(--card-border); 
            border-top-color: var(--primary); 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
    </style>
</head>
<body class="dark-theme">

<div class="app-container">
    <div class="header">
        <h2 id="page-title"></h2>
        <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">☀️</button>
    </div>
    
    <div class="content fade-in" id="app-content"></div>

    <div class="footer">
        V3.3 // <span>Secure Hub</span>
    </div>
</div>

<div id="toast">✅ Copied</div>

<script>
    let isDarkMode = true;
    let autoPasteEnabled = false;
    
    let vaultPassword = localStorage.getItem('jih4d_vault_pass') || '';

    // ================== Name Generation Tracking Logic ==================
    // Object to store used names for each country and gender combination
    let usedNames = {};

    function saveVaultPassword(val) {
        vaultPassword = val;
        localStorage.setItem('jih4d_vault_pass', val);
    }

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        document.body.classList.toggle('dark-theme', isDarkMode);
        document.getElementById('themeIcon').innerText = isDarkMode ? "☀️" : "🌙";
    }

    function copyText(text, message) {
        navigator.clipboard.writeText(text).then(() => {
            let toast = document.getElementById("toast");
            toast.innerText = message || "✅ Copied!";
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
        });
    }

    function toggle2FAMode(checked, manualId, autoId, resultId) {
        autoPasteEnabled = checked;
        document.getElementById(manualId).style.display = checked ? 'none' : 'block';
        document.getElementById(autoId).style.display = checked ? 'block' : 'none';
        document.getElementById(resultId).innerHTML = ''; 
        
        let inp = document.getElementById(manualId).querySelector('input');
        if(inp) inp.value = '';
    }

    function manualProcess2FA(inputId, targetId) {
        let secret = document.getElementById(inputId).value.replace(/\\s+/g, '').toUpperCase();
        execute2FACore(secret, targetId, false);
    }

    function autoPasteProcess2FA(targetId) {
        navigator.clipboard.readText().then(text => {
            let secret = text.replace(/\\s+/g, '').toUpperCase();
            execute2FACore(secret, targetId, true);
        }).catch(err => {
            document.getElementById(targetId).innerHTML = `<div style="color:var(--danger); font-size:11px; text-align:center; padding:10px; border:1px solid var(--danger); border-radius:6px; margin-top:8px;">⚠️ Browser permission denied</div>`;
        });
    }

    function execute2FACore(secret, targetId, isAuto) {
        const resultDiv = document.getElementById(targetId);
        if (!secret) { resultDiv.innerHTML = ``; return; }

        let displaySecret = secret.length > 25 ? secret.substring(0, 25) + '...' : secret;

        try {
            let totp = new OTPAuth.TOTP({ algorithm: 'SHA1', digits: 6, period: 30, secret: OTPAuth.Secret.fromBase32(secret) });
            let code = totp.generate();
            
            let pastedKeyHTML = isAuto ? `<div style="font-size: 10px; color: var(--text-muted); text-align: center; margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid var(--card-border); word-break: break-all;">Key: ${secret}</div>` : '';

            // Compacted Decrypted Token Box
            resultDiv.innerHTML = `
                <div class="data-card fade-in" style="cursor: pointer; border-color: var(--primary); margin-top:8px; padding: 8px;" onclick="copyText('${code}', '🔑 Token Copied: ${code}')">
                    ${pastedKeyHTML}
                    <p style="text-align:center; font-size:10px; color:var(--success); margin-bottom: 2px;">Decrypted Token</p>
                    <div class="code-display">${code}</div>
                    <p style="text-align:center; font-size:9px; color:var(--text-muted);">Tap to copy</p>
                </div>
            `;
            if(isAuto) { copyText(code, `🔑 Auto Copied: ${code}`); }
        } catch (e) { 
            resultDiv.innerHTML = `
                <div style="color:var(--danger); font-size:11px; text-align:center; margin-top:8px; padding: 8px; border: 1px solid var(--danger); border-radius: 6px; background: rgba(239, 68, 68, 0.05);">
                    <div style="font-weight: 600; margin-bottom: 2px;">Invalid Key</div>
                    <div style="font-size: 10px; color: var(--text-muted); word-break: break-all;">Input: ${displaySecret}</div>
                </div>
            `; 
        }
    }

    function getToggleUI(funcName, manualId, autoId, resultId) {
        return `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 6px 10px; background: var(--input-bg); border-radius: 6px; border: 1px solid var(--card-border);">
                <div>
                    <div style="font-size: 11px; font-weight: 600;">Auto Paste Mode</div>
                    <div style="font-size: 9px; color: var(--text-muted);">Requires clipboard access</div>
                </div>
                <label class="switch" style="transform: scale(0.75); transform-origin: right center; margin: 0;">
                    <input type="checkbox" onchange="${funcName}(this.checked, '${manualId}', '${autoId}', '${resultId}')" ${autoPasteEnabled ? 'checked' : ''}>
                    <span class="slider"></span>
                </label>
            </div>
        `;
    }

    const accountData = {
        bd: { male_first: ["Rahim", "Karim", "Arif", "Hasan", "Sajid", "Tarik", "Fahim"], female_first: ["Sadia", "Nusrat", "Ayesha", "Mariya", "Jannat", "Riya", "Suma"], last: ["Islam", "Uddin", "Akter", "Rahman", "Hossain", "Chowdhury", "Khan"] },
        usa: { male_first: ["John", "Michael", "David", "James", "William", "Robert", "Joseph"], female_first: ["Emma", "Olivia", "Sophia", "Isabella", "Mia", "Charlotte", "Amelia"], last: ["Smith", "Johnson", "Williams", "Brown", "Jones", "Miller", "Davis"] },
        uk: { male_first: ["George", "Harry", "Jack", "Oliver", "Charlie", "Thomas", "Arthur"], female_first: ["Amelia", "Margaret", "Lily", "Emily", "Jessica", "Isla", "Poppy"], last: ["Evans", "Davies", "Wilson", "Taylor", "Thomas", "Roberts", "Walker"] },
        fr: { male_first: ["Lucas", "Hugo", "Arthur", "Louis", "Gabriel", "Jules", "Paul"], female_first: ["Jade", "Louise", "Alice", "Chloé", "Léa", "Manon", "Emma"], last: ["Martin", "Bernard", "Dubois", "Thomas", "Robert", "Richard", "Petit"] }
    };
    const countryNames = {'bd': 'Bangladesh', 'usa': 'USA', 'uk': 'UK', 'fr': 'France'};

    const contentDiv = document.getElementById('app-content');
    
    function renderView(html, title = '') {
        document.getElementById('page-title').innerText = title;
        contentDiv.classList.remove("fade-in");
        void contentDiv.offsetWidth; 
        contentDiv.innerHTML = html;
        contentDiv.classList.add("fade-in");
    }

    function showMainMenu() {
        renderView(`
            <div class="data-card">
                <h3 style="font-size: 14px; margin-bottom: 8px;">Vault Configuration</h3>
                <div class="input-group">
                    <input type="text" class="input-box" placeholder="Set global password here..." value="${vaultPassword}" oninput="saveVaultPassword(this.value)">
                    <a href="mailto:contact@jih4d.com" class="dev-link">Contact Developer (JIH4D)</a>
                </div>
            </div>

            <h3 style="margin-top: 16px;">Utility Modules</h3>
            <p class="desc">Select a tool to begin.</p>
            <div class="grid-2">
                <button class="btn" onclick="showComingSoon()">Numbers</button>
                <button class="btn" onclick="showIgChecker()">IG Intel</button>
                <button class="btn" onclick="show2FA()">2FA Core</button>
                <button class="btn" onclick="showPlatformMenu()">Identity</button>
            </div>
        `, '');
    }

    function showIgChecker() {
        renderView(`
            <p class="desc">Check account availability.</p>
            <div class="input-group">
                <input type="text" id="igUsername" class="input-box" placeholder="@username" onkeypress="if(event.key === 'Enter') checkIgId()">
                <a href="mailto:contact@jih4d.com" class="dev-link">Contact Developer (JIH4D)</a>
            </div>
            <button class="btn btn-primary" onclick="checkIgId()">Start Scan</button>
            <div id="igResult" style="margin-top: 12px;"></div>
            <div class="divider"></div>
            <button class="btn" onclick="showMainMenu()">Back to Hub</button>
        `, 'Instagram Intel');
    }

    function checkIgId() {
        let username = document.getElementById('igUsername').value.trim().replace('@', '');
        let resultDiv = document.getElementById('igResult');
        if(!username) return;
        resultDiv.innerHTML = `<div style="text-align:center; padding: 16px;"><div class="spinner"></div></div>`;
        setTimeout(() => {
            resultDiv.innerHTML = `
                <div class="data-card fade-in" style="text-align:center; border-color: var(--success);">
                    <h3 style="font-size:14px; color:var(--success); margin-bottom:6px;">Scan Complete</h3>
                    <p style="margin-bottom: 12px; font-size:13px; font-weight:500;">User: @${username}</p>
                    <a href="https://www.instagram.com/${username}/" target="_blank" class="btn btn-primary" style="text-decoration: none; display:block;">Open Profile</a>
                </div>
            `;
        }, 1200);
    }

    function show2FA() {
        renderView(`
            <p class="desc">Extract security tokens easily.</p>
            
            ${getToggleUI('toggle2FAMode', 'manualMain2FA', 'autoMain2FA', 'totpResult')}

            <div id="manualMain2FA" style="display: ${autoPasteEnabled ? 'none' : 'block'};">
                <div class="input-group">
                    <input type="text" id="secretKey" class="input-box" placeholder="PASTE SECRET KEY HERE" oninput="manualProcess2FA('secretKey', 'totpResult')">
                    <a href="mailto:contact@jih4d.com" class="dev-link">Contact Developer (JIH4D)</a>
                </div>
            </div>

            <div id="autoMain2FA" style="display: ${autoPasteEnabled ? 'block' : 'none'};">
                <div class="input-group">
                    <button class="btn btn-primary" onclick="autoPasteProcess2FA('totpResult')">Auto Paste & Decrypt</button>
                    <a href="mailto:contact@jih4d.com" class="dev-link">Contact Developer (JIH4D)</a>
                </div>
            </div>

            <div id="totpResult"></div>
            <div class="divider"></div>
            <button class="btn" onclick="showMainMenu()">Back to Hub</button>
        `, '2FA Decryptor');
    }

    let selPlat = '', selCoun = '';

    function showPlatformMenu() {
        renderView(`
            <p class="desc">Select target platform.</p>
            <div class="grid-2">
                <button class="btn btn-primary" onclick="selectPlatform('fb')">Facebook</button>
                <button class="btn btn-primary" onclick="selectPlatform('ig')">Instagram</button>
            </div>
            <div class="divider"></div>
            <button class="btn" onclick="showMainMenu()">Back to Hub</button>
        `, 'Identity Generator');
    }

    function selectPlatform(p) {
        selPlat = p;
        renderView(`
            <p class="desc">Choose geographic region.</p>
            <div class="grid-2">
                <button class="btn" onclick="selectCountry('bd')">BGD</button>
                <button class="btn" onclick="selectCountry('usa')">USA</button>
                <button class="btn" onclick="selectCountry('uk')">GBR</button>
                <button class="btn" onclick="selectCountry('fr')">FRA</button>
            </div>
            <div class="divider"></div>
            <button class="btn" onclick="showPlatformMenu()">Back</button>
        `, 'Select Locale');
    }

    function selectCountry(c) {
        selCoun = c;
        renderView(`
            <p class="desc">Choose identity type.</p>
            <div class="grid-2">
                <button class="btn" onclick="generateName('male')">Male</button>
                <button class="btn" onclick="generateName('female')">Female</button>
            </div>
            <div class="divider"></div>
            <button class="btn" onclick="selectPlatform(selPlat)">Back</button>
        `, 'Select Gender');
    }

    function generateName(g) {
        // Unique name generation logic
        const key = `${selCoun}_${g}_${selPlat}`;
        if (!usedNames[key]) {
            usedNames[key] = [];
        }

        let fn = accountData[selCoun][`${g}_first`];
        let ln = accountData[selCoun]["last"];
        let f, l, textToCopy;
        
        let attempts = 0;
        const maxAttempts = fn.length * ln.length; // Prevent infinite loops

        do {
            f = fn[Math.floor(Math.random()*fn.length)];
            l = ln[Math.floor(Math.random()*ln.length)];
            
            if (selPlat === 'fb') {
                textToCopy = `${f} ${l}`;
            } else {
                // For IG, append a random number, making it highly unique anyway, 
                // but we still track it to ensure variety.
                textToCopy = `${f.toLowerCase()}_${l.toLowerCase()}_${Math.floor(Math.random()*9000)+1000}`;
            }
            attempts++;
            
            // If we've exhausted all combinations, clear the history for this key to start over
            if (attempts > maxAttempts) {
                usedNames[key] = [];
            }
        } while (usedNames[key].includes(textToCopy) && attempts <= maxAttempts);

        usedNames[key].push(textToCopy);

        let resultTextHTML = '';
        let pageDynamicTitle = `${countryNames[selCoun]} - ${g.charAt(0).toUpperCase() + g.slice(1)}`;

        if (selPlat === 'fb') {
            resultTextHTML = `
                <div class="clickable-data" style="font-size: 15px; width:100%; text-align:center; margin-bottom:6px;" onclick="copyText('${textToCopy}', '👤 Name Copied!')">${textToCopy}</div>
                <div style="display:flex; gap:6px;">
                    <div class="clickable-data" style="flex:1; text-align:center;" onclick="copyText('${f}', '👤 First Name Copied!')">${f}</div>
                    <div class="clickable-data" style="flex:1; text-align:center;" onclick="copyText('${l}', '👤 Last Name Copied!')">${l}</div>
                </div>`;
        } else {
            resultTextHTML = `
                <div class="clickable-data" style="font-size: 14px; width:100%; text-align:center;" onclick="copyText('${textToCopy}', '📸 Username Copied!')">${textToCopy}</div>
            `;
        }

        let passwordBlockHTML = vaultPassword ? `
            <div class="divider" style="margin: 8px 0;"></div>
            <div style="font-size:11px; color:var(--text-muted); margin-bottom:6px;">Vault Password</div>
            <div class="clickable-data" style="font-size: 13px; width:100%; text-align:center;" onclick="copyText('${vaultPassword.replace(/'/g, "\\'")}', '🔑 Password Copied!')">
                ${vaultPassword}
            </div>
        ` : '';

        renderView(`
            <div class="data-card" style="text-align:center; margin-bottom: 8px;">
                ${resultTextHTML}
                ${passwordBlockHTML}
            </div>

            <div style="font-size: 11px; font-weight: 600; color: var(--text-muted); margin-top: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Quick 2FA</div>
            ${getToggleUI('toggle2FAMode', 'manualProfile2FA', 'autoProfile2FA', 'profile2FAResult')}

            <div id="manualProfile2FA" style="display: ${autoPasteEnabled ? 'none' : 'block'};">
                <div class="input-group">
                    <input type="text" id="secretKeyProfile" class="input-box" placeholder="PASTE SECRET KEY HERE" oninput="manualProcess2FA('secretKeyProfile', 'profile2FAResult')">
                    <a href="mailto:contact@jih4d.com" class="dev-link">Contact Developer (JIH4D)</a>
                </div>
            </div>

            <div id="autoProfile2FA" style="display: ${autoPasteEnabled ? 'block' : 'none'};">
                <div class="input-group">
                    <button class="btn btn-primary" onclick="autoPasteProcess2FA('profile2FAResult')">Auto Paste & Decrypt</button>
                    <a href="mailto:contact@jih4d.com" class="dev-link">Contact Developer (JIH4D)</a>
                </div>
            </div>

            <div id="profile2FAResult"></div>

            <div class="grid-2" style="margin-top:12px;">
                <button class="btn btn-primary" style="grid-column: span 2;" onclick="generateName('${g}')">Generate Again</button>
                <button class="btn" onclick="selectCountry(selCoun)">Change Gender</button>
                <button class="btn" onclick="selectPlatform(selPlat)">Change Locale</button>
                <button class="btn" style="grid-column: span 2;" onclick="showMainMenu()">Back to Hub</button>
            </div>
        `, pageDynamicTitle);
    }

    function showComingSoon() {
        renderView(`
            <div style="text-align:center; padding-top: 30px;">
                <div style="font-size:40px; margin-bottom: 12px;">🚀</div>
                <p class="desc">This feature will be available soon.</p>
