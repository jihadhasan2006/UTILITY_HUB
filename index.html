<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Account Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); display: flex; justify-content: center; align-items: flex-start; padding: 50px 20px; color: #ffffff; }
        .glass-container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); border-radius: 24px; padding: 40px; width: 100%; max-width: 850px; }
        h2 { text-align: center; margin-top: 0; font-weight: 600; font-size: 28px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px; margin-bottom: 30px; }
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 400; color: rgba(255, 255, 255, 0.8); }
        input[type="text"], input[type="password"] { width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #ffffff; font-size: 16px; outline: none; transition: 0.3s ease; }
        input[type="text"]:focus, input[type="password"]:focus { background: rgba(0, 0, 0, 0.3); border-color: #00d2ff; box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }
        .checkbox-wrapper { display: flex; align-items: center; margin-top: 10px; }
        .checkbox-wrapper input[type="checkbox"] { appearance: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 6px; margin-right: 10px; cursor: pointer; position: relative; transition: 0.3s; }
        .checkbox-wrapper input[type="checkbox"]:checked { background-color: #00d2ff; border-color: #00d2ff; }
        .checkbox-wrapper input[type="checkbox"]:checked::after { content: "✔"; position: absolute; color: #000; font-size: 14px; font-weight: bold; top: -1px; left: 3px; }
        .checkbox-wrapper label { margin: 0; cursor: pointer; color: #00d2ff; font-weight: 500; }
        .btn-group { display: flex; gap: 15px; margin-top: 35px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; color: #ffffff; display: flex; justify-content: center; align-items: center; }
        .btn-save { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(56, 239, 125, 0.5); }
        .btn-download { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
        .btn-download:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 114, 255, 0.5); }
        .table-wrap { margin-top: 40px; background: rgba(0, 0, 0, 0.2); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(255, 255, 255, 0.05); padding: 18px 20px; font-weight: 500; color: #00d2ff; text-transform: uppercase; font-size: 13px; }
        td { padding: 16px 20px; border-top: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px; color: rgba(255, 255, 255, 0.9); word-break: break-all; }
        tr:hover td { background: rgba(255, 255, 255, 0.03); }
        .key-text { font-family: monospace; color: #a8ff78; letter-spacing: 1px; }
        .status { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 500; }
        .link-box { background: rgba(0, 210, 255, 0.1); border: 1px dashed #00d2ff; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="glass-container">
    <h2>Secure Data Vault</h2>
    
    <div class="link-box">
        <div class="input-group" style="margin-bottom: 0;">
            <label style="color: #00d2ff;">🔗 GOOGLE SHEET WEB APP URL</label>
            <input type="password" id="sheetUrl" placeholder="Paste your script.google.com/... link here" autocomplete="off">
        </div>
    </div>
    
    <div class="input-group">
        <label>USERNAME / EMAIL</label>
        <input type="text" id="userName" placeholder="Enter your username" autocomplete="off">
    </div>

    <div class="input-group">
        <label>PASSWORD</label>
        <input type="text" id="passWord" placeholder="Enter account password" autocomplete="off">
        <div class="checkbox-wrapper">
            <input type="checkbox" id="keepPass">
            <label for="keepPass">Lock Password</label>
        </div>
    </div>
    
    <div class="input-group">
        <label>2FA SECRET KEY / LINK</label>
        <input type="text" id="secretKey" placeholder="Paste Base32 Secret Key or URL" autocomplete="off">
    </div>
    
    <div class="btn-group">
        <button class="btn-save" onclick="saveData()">✦ Save to Sheet</button>
        <button class="btn-download" onclick="downloadExcel()">⭳ Export Excel</button>
    </div>

    <div id="statusBox" class="status"></div>

    <div class="table-wrap">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Password</th>
                    <th>2FA Secret</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will appear here locally after saving -->
            </tbody>
        </table>
    </div>
</div>

<script>
    let allData = [];

    window.onload = function() {
        if(localStorage.getItem("MySheetLink")) {
            document.getElementById('sheetUrl').value = localStorage.getItem("MySheetLink");
        }
        if(localStorage.getItem("LocalVaultData_NoDate")) {
            allData = JSON.parse(localStorage.getItem("LocalVaultData_NoDate"));
            renderTable();
        }
    };

    function saveData() {
        const scriptURL = document.getElementById('sheetUrl').value.trim();
        const user = document.getElementById('userName').value.trim();
        const pass = document.getElementById('passWord').value.trim();
        let key = document.getElementById('secretKey').value.trim();

        if(!scriptURL.startsWith("https://script.google.com")) {
            alert("⚠️ দয়া করে বক্সে সঠিক Web App URL (script.google.com...) লিংকটি দিন।");
            return;
        }

        if (!user || !pass || !key) {
            alert("⚠️ দয়া করে ইউজারনেম, পাসওয়ার্ড এবং ২এফএ—তিনটি তথ্যই পূরণ করুন।");
            return;
        }

        if (key.includes('#')) key = key.split('#')[1];
        if (key.includes('secret=')) key = key.split('secret=')[1].split('&')[0];

        localStorage.setItem("MySheetLink", scriptURL);

        document.getElementById('statusBox').innerText = "⏳ Saving to Google Sheets...";
        document.getElementById('statusBox').style.color = "#f6d365";

        const formData = new FormData();
        formData.append('username', user);
        formData.append('password', pass);
        formData.append('secret', key);

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                document.getElementById('statusBox').innerText = "✅ Saved Successfully to Google Sheet!";
                document.getElementById('statusBox').style.color = "#38ef7d";
                
                allData.unshift({ "Username": user, "Password": pass, "2FA_Key": key });
                localStorage.setItem("LocalVaultData_NoDate", JSON.stringify(allData));
                renderTable();

                document.getElementById('userName').value = '';
                document.getElementById('secretKey').value = '';
                if (!document.getElementById('keepPass').checked) document.getElementById('passWord').value = '';
                document.getElementById('userName').focus();
            })
            .catch(error => {
                document.getElementById('statusBox').innerText = "❌ Error! Check Internet or Link.";
                document.getElementById('statusBox').style.color = "#ef473a";
            });
    }

    function renderTable() {
        const tableBody = document.querySelector('#dataTable tbody');
        tableBody.innerHTML = '';
        allData.forEach(item => {
            const row = `<tr>
                <td>${item.Username}</td>
                <td>${item.Password}</td>
                <td class="key-text">${item["2FA_Key"]}</td>
            </tr>`;
            tableBody.insertAdjacentHTML('beforeend', row);
        });
    }

    function downloadExcel() {
        if (allData.length === 0) return alert("⚠️ ডাউনলোড করার মতো কোনো ডাটা নেই!");
        
        const workbook = XLSX.utils.book_new();
        const worksheet = XLSX.utils.json_to_sheet(allData);
        XLSX.utils.book_append_sheet(workbook, worksheet, "Vault_Data");
        
        XLSX.writeFile(workbook, `Secure_Vault_Data.xlsx`);
    }
</script>

</body>
</html>
